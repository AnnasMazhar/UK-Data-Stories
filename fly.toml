app = "govdatastory"
region = "lhr"
http_port = 8000

[build]
  builder = "python"

[[services]]
  http_checks = []
  internal_port = 8000
  protocol = "tcp"
  script = "python -m uvicorn api.main:app --host 0.0.0.0 --port 8000"

[[services.ports]]
  force_https = true
  handlers = ["http"]
  port = 80

[[services.ports]]
  handlers = ["tls", "http"]
  port = 443
